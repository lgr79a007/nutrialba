<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>NutriAlba</title>
<link rel="icon" type="image/png" href="img/Cat-black-angry-by-Rones.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<div class="fondo">

  <!-- Pantalla de inicio de sesión -->
  <div id="pantalla-login" class="pantalla pantalla-login">
    <div class="tarjeta-login">
      <div class="mascota-grande">
        <img src="img/Cat-black-angry-by-Rones.png" alt="Gatita de NutriAlba" class="mascota-imagen mascota-imagen-grande" />
      </div>
      <h1>NutriAlba</h1>
      <p class="subtitulo">¡Hola! Antes de empezar, conecta con Google para guardar tus comidas.</p>
      <button id="btn-login" class="boton-principal">Conectar con Google</button>
      <p id="aviso-prueba" class="aviso-prueba oculto">
        Modo de prueba: la app aún no está conectada a Google Sheets de verdad. Los datos que guardes aquí no se guardan en ningún sitio.
      </p>
      <p id="login-error" class="login-error oculto"></p>
    </div>
  </div>

  <!-- Pantalla principal de la app -->
  <div id="pantalla-app" class="pantalla pantalla-app oculto">

    <header class="cabecera">
      <img src="img/Cat-black-angry-by-Rones.png" alt="Gatita de NutriAlba" class="mascota-imagen mascota-imagen-pequena" />
      <div>
        <p class="titulo-cabecera">Hola, Alba</p>
        <p class="subtitulo-cabecera">¿Qué has comido?</p>
      </div>
    </header>

    <section class="seccion">
      <label class="titulo-seccion" for="input-fecha">Día</label>
      <input type="date" id="input-fecha" class="selector-fecha" />
    </section>

    <section class="seccion">
      <p class="titulo-seccion">Momento del día</p>
      <div id="lista-momentos" class="lista-momentos"></div>
    </section>

    <section class="seccion">
      <p class="titulo-seccion">Elige lo que has comido</p>
      <div id="lista-alimentos" class="lista-alimentos"></div>
    </section>

    <div class="barra-guardar">
      <p id="contador-seleccion" class="contador-seleccion"></p>
      <button id="btn-guardar" class="boton-principal" disabled>Guardar comida</button>
    </div>

  </div>

  <!-- Pop-up de confirmación -->
  <div id="modal-overlay" class="modal-overlay oculto">
    <div class="modal-tarjeta">

      <div id="modal-resumen">
        <div id="modal-resumen-cuerpo"></div>
        <div class="modal-botones">
          <button id="btn-modal-editar" class="boton-secundario">Editar</button>
          <button id="btn-modal-confirmar" class="boton-principal">Confirmar</button>
        </div>
      </div>

      <div id="modal-resultado" class="oculto">
        <div class="mascota-grande">
          <img src="img/Cat-black-angry-by-Rones.png" alt="Gatita de NutriAlba" class="mascota-imagen mascota-imagen-resultado" />
        </div>
        <p id="modal-mensaje-resultado" class="modal-mensaje-resultado"></p>
        <button id="btn-modal-cerrar" class="boton-principal">Vale</button>
        <div id="modal-botones-error" class="modal-botones oculto">
          <button id="btn-modal-cancelar" class="boton-secundario">Cancelar</button>
          <button id="btn-modal-reintentar" class="boton-principal">Reintentar</button>
        </div>
      </div>

    </div>
  </div>

</div>

<script src="js/config.js"></script>
<script src="js/sheets.js"></script>
<script src="js/app.js"></script>
</body>
</html>
